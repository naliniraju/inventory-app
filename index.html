<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory Dashboard</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<!-- Toastify CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">

<!-- Custom CSS -->
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="dashboard-header">
  <h1>Inventory Dashboard</h1>
  <div class="header-controls">
    <input type="text" id="search" placeholder="Search item/category">
    <div class="buttons">
      <button class="btn-add" onclick="openModal()">Add Item</button>
      <button class="btn-mail" onclick="sendLowStockEmail()">Send Low Stock Email</button>
    </div>
  </div>
</header>

<div class="table-container">
  <table>
    <thead>
      <tr>
        <th>Item</th>
        <th>Category</th>
      <!-- <th>Qty</th>-->
        <th>Available</th>
        <th>Min</th>
        <th>Units</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<!-- Modal -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h2 id="modalTitle">Add Item</h2>
    <input id="modalItem" placeholder="Item Name">
    <input id="modalCategory" placeholder="Category">
  <!--  <input id="modalQty" type="number" placeholder="Quantity">-->
    <input id="modalAvailableStock" type="number" placeholder="Available Stock">
    <input id="modalMinStock" type="number" placeholder="Minimum Stock">
    <input id="modalUnits" placeholder="Units">
    <div class="modal-actions">
      <button class="btn-add" onclick="saveItem()">Save</button>
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
<script src="app.js"></script>
</body>
</html>
